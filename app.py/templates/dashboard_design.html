<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPIYD — Dashboard de Alertas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#b9c7e4;--secondary:#a1d494;--tertiary:#e7bf99;--error:#ffb4ab;
      --surface:#131315;--surface-container:#1f1f21;--surface-container-high:#2a2a2c;
      --on-surface:#e4e2e4;--on-surface-var:#c5c6cd;--outline-var:rgba(68,71,77,.4);
      --red:#ffb4ab;--orange:#e7bf99;--yellow:#ffcc66;
    }
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#020617;color:#e4e2e4}
    body{background-image:radial-gradient(circle at 50% 50%,#0a192f 0%,#020617 100%)}
    #root{width:100%;height:100vh;display:flex;flex-direction:column}
    .mono{font-family:'JetBrains Mono',monospace}
    .headline{font-family:'Space Grotesk',sans-serif}

    /* Glass — mismo sistema que admin/superadmin */
    .g{position:relative;overflow:hidden;background:rgba(19,19,21,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(143,144,151,0.2);border-radius:.75rem;box-shadow:inset 0 1px 1px rgba(255,255,255,.05)}
    .g-dark{background:rgba(19,19,21,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(143,144,151,0.15);border-radius:.65rem;overflow:hidden}

    /* Scrollbar */
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:rgba(143,144,151,.3);border-radius:99px}

    /* Pulse */
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.7)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-in{animation:fadeIn .3s ease both}

    /* Severity badges */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:.56rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;font-family:'JetBrains Mono',monospace}
    .b-critical{background:rgba(255,180,171,.12);color:#ffb4ab;border:1px solid rgba(255,180,171,.28)}
    .b-high    {background:rgba(231,191,153,.12);color:#e7bf99;border:1px solid rgba(231,191,153,.28)}
    .b-medium  {background:rgba(185,199,228,.10);color:#b9c7e4;border:1px solid rgba(185,199,228,.22)}

    /* Input / Select */
    .ctrl{background:rgba(19,19,21,.8);border:1px solid rgba(143,144,151,.25);color:#e4e2e4;font-family:'Inter',sans-serif;font-size:.72rem;padding:7px 10px;border-radius:.5rem;outline:none;transition:border-color .2s}
    .ctrl:focus{border-color:rgba(185,199,228,.5)}
    .ctrl::placeholder{color:rgba(197,198,205,.3)}
    .ctrl option{background:#1f1f21}

    /* Tab */
    .tab{padding:5px 13px;border-radius:99px;font-size:.68rem;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;letter-spacing:.01em}
    .tab-active{background:rgba(35,80,30,.6);color:#a1d494;border:1px solid rgba(161,212,148,.3)}
    .tab-inactive{background:transparent;color:rgba(197,198,205,.45);border:1px solid rgba(143,144,151,.18)}

    /* FWI bar */
    .fwi-bar{height:3px;border-radius:99px;background:rgba(143,144,151,.12)}
    .fwi-fill{height:100%;border-radius:99px;transition:width .6s}
  </style>

<div id="root"></div>
<script>
window.SPIYD_CONFIG = {{ config|tojson|safe }};

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ════ SERVER DATA ════ */
const SPIYD_CONFIG  = window.SPIYD_CONFIG  || {};
const SPIYD_FOCOS   = window.SPIYD_FOCOS   || [];
const SPIYD_SMN     = window.SPIYD_SMN     || [];
const HAS_REAL_DATA = SPIYD_FOCOS.length   > 0;

/* ════ CONSTANTS ════ */
const SOURCES = ['NASA FIRMS','GOES-16','NOAA-20','METOP-B','AQUA','TERRA','INPE'];

const PROVINCES = [
  {country:'AR', label:'Argentina — todas', value:'AR'},
  {country:'AR', label:'Buenos Aires', value:'AR-B'},{country:'AR', label:'Chaco', value:'AR-H'},
  {country:'AR', label:'Corrientes', value:'AR-W'},{country:'AR', label:'Entre Ríos', value:'AR-E'},
  {country:'AR', label:'Formosa', value:'AR-P'},{country:'AR', label:'Misiones', value:'AR-N'},
  {country:'AR', label:'Santa Fe', value:'AR-S'},{country:'AR', label:'Santiago del Estero', value:'AR-G'},
  {country:'AR', label:'Salta', value:'AR-A'},{country:'AR', label:'Jujuy', value:'AR-Y'},
  {country:'BR', label:'Brasil — todas', value:'BR'},
  {country:'BR', label:'Mato Grosso', value:'BR-MT'},{country:'BR', label:'Pará', value:'BR-PA'},
  {country:'BR', label:'Mato Grosso do Sul', value:'BR-MS'},{country:'BR', label:'Rio Grande do Sul', value:'BR-RS'},
  {country:'BR', label:'São Paulo', value:'BR-SP'},{country:'BR', label:'Rondônia', value:'BR-RO'},
  {country:'BO', label:'Bolivia — todas', value:'BO'},
  {country:'BO', label:'Beni', value:'BO-B'},{country:'BO', label:'Santa Cruz', value:'BO-S'},
  {country:'PY', label:'Paraguay', value:'PY'},
  {country:'UY', label:'Uruguay', value:'UY'},
];

const REGION_MAP = {
  'AR-H':'Chaco, AR','AR-W':'Corrientes, AR','AR-E':'Entre Ríos, AR','AR-P':'Formosa, AR',
  'AR-N':'Misiones, AR','AR-B':'Buenos Aires, AR','AR-S':'Santa Fe, AR','AR-G':'Santiago del Estero, AR',
  'AR-A':'Salta, AR','AR-Y':'Jujuy, AR',
  'BR-MT':'Mato Grosso, BR','BR-PA':'Pará, BR','BR-MS':'Mato Grosso do Sul, BR','BR-RS':'Rio Grande do Sul, BR',
  'BR-SP':'São Paulo, BR','BR-RO':'Rondônia, BR',
  'BO-B':'Beni, BO','BO-S':'Santa Cruz, BO',
  'PY':'Paraguay','UY':'Uruguay',
};

const COORDS_BY_PROV = {
  'AR-H':[-24.1,-61.5],'AR-W':[-28.5,-57.2],'AR-E':[-31.8,-59.6],'AR-P':[-23.9,-60.8],
  'AR-N':[-26.8,-55.0],'AR-B':[-36.6,-60.9],'AR-S':[-30.7,-60.7],'AR-G':[-27.8,-64.3],
  'AR-A':[-24.8,-65.4],'AR-Y':[-23.5,-65.2],
  'BR-MT':[-10.2,-52.4],'BR-PA':[-3.8,-55.1],'BR-MS':[-20.3,-55.8],'BR-RS':[-29.4,-53.1],
  'BR-SP':[-22.5,-47.5],'BR-RO':[-11.5,-62.0],
  'BO-B':[-14.9,-63.2],'BO-S':[-17.2,-63.6],
  'PY':[-23.4,-58.4],'UY':[-32.5,-55.7],
};

/* ── Demo alert generator ── */
let alertCounter = 2048;
function genAlert(provincePick) {
  const provinces = provincePick && provincePick !== 'AR' && provincePick !== 'BR' && provincePick !== 'BO'
    ? [provincePick]
    : Object.keys(COORDS_BY_PROV);
  const prov = provinces[Math.floor(Math.random() * provinces.length)];
  const [lat, lon] = COORDS_BY_PROV[prov] || [-20, -60];
  const sev = Math.random() < .2 ? 'critical' : Math.random() < .5 ? 'high' : 'medium';
  return {
    id: `SPY-${(alertCounter++).toString().padStart(4,'0')}`,
    region: REGION_MAP[prov] || 'Cono Sur',
    province: prov,
    lat: lat + (Math.random()-.5)*2,
    lon: lon + (Math.random()-.5)*2,
    severity: sev,
    source: SOURCES[Math.floor(Math.random()*SOURCES.length)],
    ha: Math.floor(50 + Math.random()*4800),
    confidence: Math.floor(68 + Math.random()*30),
    frp: parseFloat((5 + Math.random()*180).toFixed(1)),  // Fire Radiative Power (FIRMS field)
    temp: Math.floor(320 + Math.random()*280),
    ts: Date.now() - Math.floor(Math.random()*3600000*4),
    status: Math.random()<.15?'active':'monitoring',
    daynight: Math.random()<.5?'D':'N',
  };
}

const INITIAL = HAS_REAL_DATA ? SPIYD_FOCOS : Array.from({length:10}, ()=>genAlert(null));

/* ── Hourly trend ── */
const HOURLY_24 = Array.from({length:24}, (_,i) => ({
  h: i,
  critical: Math.floor(Math.random()*4 + (i>12&&i<20?3:0)),
  high: Math.floor(Math.random()*8 + 2),
  medium: Math.floor(Math.random()*10 + 3),
}));

function Logo({size=24}) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="17" stroke="rgba(255,255,255,.38)" strokeWidth="1.2"/>
      <ellipse cx="20" cy="20" rx="10" ry="5" stroke="rgba(255,255,255,.22)" strokeWidth="1" transform="rotate(-35 20 20)"/>
      <circle cx="20" cy="20" r="4.2" fill="rgba(255,255,255,.90)"/>
      <circle cx="33" cy="12" r="2.6" fill="rgba(255,255,255,.72)"/>
      <circle cx="8"  cy="30" r="1.4" fill="rgba(255,255,255,.40)"/>
    </svg>
  );
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return `${Math.floor(d/1000)}s`;
  if (d < 3600000) return `${Math.floor(d/60000)}m`;
  return `${Math.floor(d/3600000)}h`;
}

/* ═══════════════ TREND CHART ═══════════════ */
function TrendChart({data, metric}) {
  const ref = useRef(); const chartRef = useRef();

  useEffect(()=>{
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = data.map(d => d.h.toString().padStart(2,'0')+':00');
    const ds = metric === 'all'
      ? [
          {label:'Críticas',data:data.map(d=>d.critical),borderColor:'#ffb4ab',backgroundColor:'rgba(255,180,171,.08)',fill:true,tension:.4,pointRadius:2,pointHoverRadius:4},
          {label:'Altas',   data:data.map(d=>d.high),    borderColor:'#e7bf99',backgroundColor:'rgba(255,170,68,.06)',fill:true,tension:.4,pointRadius:2,pointHoverRadius:4},
          {label:'Medias',  data:data.map(d=>d.medium),  borderColor:'#b9c7e4',backgroundColor:'rgba(185,199,228,.05)',fill:true,tension:.4,pointRadius:2,pointHoverRadius:4},
        ]
      : [{
          label: metric==='critical'?'Críticas':metric==='high'?'Altas':'Medias',
          data: data.map(d=>d[metric]),
          borderColor: metric==='critical'?'#ffb4ab':metric==='high'?'#e7bf99':'#b9c7e4',
          backgroundColor: metric==='critical'?'rgba(255,180,171,.12)':metric==='high'?'rgba(255,170,68,.10)':'rgba(185,199,228,.08)',
          fill:true, tension:.4, pointRadius:2, pointHoverRadius:4,
        }];

    chartRef.current = new Chart(ref.current, {
      type:'line',
      data:{labels, datasets:ds},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        interaction:{intersect:false, mode:'index'},
        plugins:{
          legend:{display:metric==='all',labels:{color:'rgba(255,255,255,.45)',font:{family:'Poppins',size:11},boxWidth:10,padding:14}},
          tooltip:{
            backgroundColor:'rgba(0,5,20,.88)',borderColor:'rgba(255,255,255,.14)',borderWidth:1,
            titleColor:'white',bodyColor:'rgba(255,255,255,.6)',titleFont:{family:'Poppins',weight:'500',size:12},
            bodyFont:{family:'Poppins',size:11},padding:10,cornerRadius:8,
          },
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.3)',font:{family:'JetBrains Mono',size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8}},
          y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.3)',font:{family:'Poppins',size:10}},beginAtZero:true},
        },
      },
    });
    return ()=>chartRef.current?.destroy();
  },[data, metric]);

  return <canvas ref={ref} width={900} height={140} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ═══════════════ FIRMS PANEL ═══════════════ */
function FirmsPanel({onData}) {
  const [status, setStatus] = useState('idle');
  const [msg,    setMsg]    = useState('');
  const [count,  setCount]  = useState(0);

  async function fetchFIRMS() {
    setStatus('loading'); setMsg('Consultando NASA FIRMS…');
    try {
      const res  = await fetch('/api/firms-data');
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
      if (!Array.isArray(json)) throw new Error('Respuesta inesperada de FIRMS');
      const alerts = json.slice(0, 60).map((f, i) => ({
        id: `FIRMS-${i.toString().padStart(4,'0')}`,
        region: `${parseFloat(f.latitude).toFixed(2)}°S ${Math.abs(parseFloat(f.longitude)).toFixed(2)}°O`,
        province: 'FIRMS',
        lat: parseFloat(f.latitude),
        lon: parseFloat(f.longitude),
        severity: parseFloat(f.confidence) >= 80 ? 'critical' : parseFloat(f.confidence) >= 60 ? 'high' : 'medium',
        source: f.satellite || 'VIIRS',
        ha: Math.round((parseFloat(f.scan)||1) * (parseFloat(f.track)||1) * 100),
        confidence: parseFloat(f.confidence) || 70,
        frp: parseFloat(f.frp) || 0,
        temp: parseFloat(f.bright_ti4) || 400,
        ts: new Date((f.acq_date||'') + 'T' + ((f.acq_time||'0000').slice(0,2)+':'+( f.acq_time||'0000').slice(2)+':00') + 'Z').getTime() || Date.now(),
        status: 'active',
        daynight: f.daynight || 'D',
        analysis_text: '',
        tipo_foco: 'NASA FIRMS',
      }));
      setCount(alerts.length);
      setStatus('ok');
      setMsg(`${alerts.length} focos VIIRS · últimas 24 h`);
      onData(alerts);
    } catch(e) {
      setStatus('error');
      setMsg(`Error: ${e.message}`);
    }
  }

  useEffect(() => { fetchFIRMS(); }, []);

  return (
    <div className="g" style={{padding:'1rem 1.2rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:'.75rem'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#88aaff" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 14.14 14.14"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
        <span style={{color:'white',fontSize:'.75rem',fontWeight:500,letterSpacing:'-.02em'}}>NASA FIRMS en vivo</span>
        {status==='ok' && <div style={{marginLeft:'auto',width:7,height:7,borderRadius:'50%',background:'#a1d494',animation:'pulse 1.8s infinite'}}/>}
        {status==='loading' && <svg style={{marginLeft:'auto',animation:'spin .7s linear infinite'}} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#88aaff" strokeWidth="2.5" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>}
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{color: status==='error'?'#ffb4ab': status==='ok'?'#a1d494':'rgba(255,255,255,.4)', fontSize:'.65rem', lineHeight:1.4}}>
          {msg || 'Iniciando…'}
        </span>
        <button onClick={fetchFIRMS} disabled={status==='loading'} style={{
          padding:'4px 10px', background:'rgba(255,255,255,.07)',
          border:'1px solid rgba(255,255,255,.12)', borderRadius:'.45rem',
          color:'rgba(255,255,255,.55)', fontFamily:'Inter', fontSize:'.62rem',
          cursor:'pointer', transition:'all .15s', flexShrink:0, marginLeft:8,
        }}>↻ Actualizar</button>
      </div>

      {status==='ok' && count>0 && (
        <div style={{marginTop:8,display:'flex',gap:8}}>
          {[['Críticos', 'critical','#ffb4ab'], ['Altos','high','#e7bf99'], ['Medios','medium','#ffcc66']].map(([l,s,c])=>{
            const n = count; // placeholder; real count done in App
            return null; // stats shown in main dashboard
          })}
          <div style={{fontSize:'.62rem',color:'rgba(255,255,255,.3)',lineHeight:1.5}}>
            Datos integrados al panel principal · fuente: VIIRS SNPP NRT
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ NOTIFICATION TOAST ═══════════════ */
function NotifStack({notifs, onDismiss}) {
  return (
    <div style={{position:'fixed',top:'4rem',right:'1rem',zIndex:9999,display:'flex',flexDirection:'column',gap:7,pointerEvents:'none'}}>
      {notifs.map(n=>{
        const col = n.sev==='critical'?'#ffb4ab':n.sev==='high'?'#e7bf99':'#ffcc55';
        return (
          <div key={n.id} style={{
            pointerEvents:'all',width:288,
            background:'rgba(19,19,21,.96)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',
            borderRadius:'.9rem',padding:'.8rem .95rem',
            boxShadow:'0 8px 28px rgba(0,0,0,.55)',
            borderLeft:`3px solid ${col}`,
            animation:'slideIn .3s cubic-bezier(.16,1,.3,1) both',
          }}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:col,flexShrink:0}}/>
                <span style={{color:'white',fontSize:'.72rem',fontWeight:500}}>Nuevo foco · {n.sev.toUpperCase()}</span>
              </div>
              <button onClick={()=>onDismiss(n.id)} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',cursor:'pointer',fontSize:13,padding:0,lineHeight:1}}>✕</button>
            </div>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:'.65rem',lineHeight:1.45}}>
              <span style={{color:'rgba(255,255,255,.75)',fontWeight:500}}>{n.region}</span><br/>
              {n.ha?.toLocaleString()} ha · {n.source}
            </div>
            <div style={{display:'flex',gap:6,marginTop:7}}>
              <button onClick={()=>onDismiss(n.id)} style={{flex:1,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',color:'rgba(255,255,255,.55)',fontFamily:'Inter',fontSize:'.6rem',padding:'4px 0',borderRadius:99,cursor:'pointer'}}>Ignorar</button>
              <button style={{flex:1,background:'rgba(255,255,255,.07)',border:`1px solid ${col}44`,color:col,fontFamily:'Inter',fontSize:'.6rem',padding:'4px 0',borderRadius:99,cursor:'pointer'}}>Ver detalle</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════ ALERT ROW ═══════════════ */
function AlertRow({alert, selected, onClick}) {
  const col = {critical:'#ffb4ab',high:'#e7bf99',medium:'#ffcc66'}[alert.severity];
  return (
    <div onClick={onClick} className="fade-in" style={{
      padding:'.8rem .9rem',borderRadius:'.7rem',cursor:'pointer',
      background:selected?'rgba(255,255,255,.07)':'transparent',
      border:`1px solid ${selected?'rgba(255,255,255,.16)':'transparent'}`,
      transition:'all .12s', marginBottom:3,
    }}
    onMouseEnter={e=>!selected&&(e.currentTarget.style.background='rgba(255,255,255,.04)')}
    onMouseLeave={e=>!selected&&(e.currentTarget.style.background='transparent')}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
        <div style={{width:5,height:5,borderRadius:'50%',background:col,flexShrink:0,
          animation:alert.status==='active'?'pulse 1.4s infinite':undefined}}/>
        <span style={{color:'white',fontSize:'.73rem',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{alert.region}</span>
        <span className={`badge b-${alert.severity}`}>{alert.severity}</span>
      </div>
      <div style={{display:'flex',gap:10,paddingLeft:12}}>
        <span style={{color:'rgba(255,255,255,.3)',fontSize:'.6rem',fontFamily:'JetBrains Mono,monospace'}}>{alert.id}</span>
        <span style={{color:'rgba(255,255,255,.28)',fontSize:'.6rem'}}>{alert.source}</span>
        <span style={{color:'rgba(255,255,255,.22)',fontSize:'.6rem',marginLeft:'auto'}}>{timeAgo(alert.ts)}</span>
      </div>
    </div>
  );
}

/* ═══════════════ DETAIL ═══════════════ */
function DetailPanel({alert}) {
  const [aiText, setAiText]     = useState('');
  const [loading, setLoading]   = useState(false);

  useEffect(()=>{
    if(!alert) return;
    if(alert.analysis_text) {
      setAiText(alert.analysis_text);
      setLoading(false);
      return;
    }
    setAiText(''); setLoading(true);
    setTimeout(()=>{
      setAiText('Sin análisis IA almacenado para este foco. Los focos con análisis completo muestran el informe detallado generado por el sistema al momento de la detección.');
      setLoading(false);
    }, 200);
  },[alert?.id]);

  if(!alert) return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.18)',fontSize:'.78rem'}}>Seleccioná una alerta para ver el análisis</div>;

  const col = {critical:'#ffb4ab',high:'#e7bf99',medium:'#ffcc66'}[alert.severity];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'.85rem',overflowY:'auto',flex:1,paddingRight:2}}>
      <div>
        <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:5}}>Alerta seleccionada</div>
        <div style={{fontSize:'1rem',fontWeight:500,letterSpacing:'-.03em',marginBottom:5}}>{alert.region}</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <span className={`badge b-${alert.severity}`}>{alert.severity}</span>
          <span style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:99,padding:'2px 9px',fontSize:'.55rem',color:'rgba(255,255,255,.45)',fontWeight:500}}>{alert.status}</span>
          <span style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:99,padding:'2px 9px',fontSize:'.55rem',color:'rgba(255,255,255,.45)',fontWeight:500}}>{alert.daynight==='D'?'Diurno':'Nocturno'}</span>

      </div>

      {/* Metrics 2-col */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {[
          ['Superficie',`${alert.ha.toLocaleString()} ha`],
          ['FRP (FIRMS)',`${alert.frp} MW`],
          ['Temperatura',`${alert.temp} K`],
          ['Confianza',`${alert.confidence}%`],
          ['Latitud',`${alert.lat.toFixed(3)}°`],
          ['Longitud',`${alert.lon.toFixed(3)}°`],
        ].map(([k,v])=>(
          <div key={k} className="g-dark" style={{padding:'.7rem .85rem'}}>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.55rem',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>{k}</div>
            <div className="mono" style={{color:'white',fontSize:'.8rem',fontWeight:500}}>{v}</div>
          </div>
        ))}
      </div>

      {/* AI */}
      <div className="g-dark" style={{padding:'.9rem',borderColor:'rgba(100,140,255,.18)'}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
          <div style={{width:18,height:18,borderRadius:'50%',background:'rgba(100,140,255,.15)',border:'1px solid rgba(100,140,255,.28)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#88aaff" strokeWidth="2" strokeLinecap="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
          </div>
          <span style={{color:'rgba(255,255,255,.4)',fontSize:'.58rem',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:500}}>Análisis IA · Claude</span>
        </div>
        {loading
          ? <div style={{color:'rgba(255,255,255,.2)',fontSize:'.72rem',fontStyle:'italic'}}>Analizando condiciones…</div>
          : <p style={{color:'rgba(255,255,255,.6)',fontSize:'.73rem',lineHeight:1.65}}>{aiText}</p>
        }
      </div>

      {/* Actions */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['Activar Brigada','Ver en Mapa','Exportar Informe'].map(a=>(
          <button key={a} style={{
            flex:1,minWidth:0,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',
            color:'rgba(255,255,255,.65)',fontFamily:'Inter',fontSize:'.65rem',fontWeight:500,
            padding:'7px 8px',borderRadius:99,cursor:'pointer',transition:'all .14s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.14)';e.currentTarget.style.color='white';}}
          onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.07)';e.currentTarget.style.color='rgba(255,255,255,.65)';}}>
            {a}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
function App() {
  function getInitialProvince() {
    const cfg = SPIYD_CONFIG;
    if (!cfg.pais) return 'all';
    if (cfg.pais === 'paraguay') return 'PY';
    const rmap = {
      'Chaco':'AR-H','Corrientes':'AR-W','Entre Ríos':'AR-E','Formosa':'AR-P',
      'Misiones':'AR-N','Buenos Aires':'AR-B','Santa Fe':'AR-S',
      'Santiago del Estero':'AR-G','Salta':'AR-A','Jujuy':'AR-Y',
    };
    if (cfg.region_nombre && rmap[cfg.region_nombre]) return rmap[cfg.region_nombre];
    return 'AR';
  }

  const [alerts, setAlerts]       = useState(INITIAL);
  const [selected, setSelected]   = useState(INITIAL[0] || null);
  const [filter, setFilter]       = useState('all');
  const [province, setProvince]   = useState(getInitialProvince);
  const [chartMetric, setChartMetric] = useState('all');
  const [chartTab, setChartTab]   = useState('trend');
  const [firmsData, setFirmsData] = useState(null);
  const [liveCount, setLiveCount] = useState(0);
  const [hourly, setHourly]       = useState(HOURLY_24);
  const [notifs, setNotifs]       = useState([]);
  const [bellCount, setBellCount] = useState(0);
  const [dateFrom, setDateFrom]   = useState('');
  const [dateTo,   setDateTo]     = useState('');

  const addNotif = useCallback((alert)=>{
    const n = {id:Date.now(),region:alert.region,sev:alert.severity,source:alert.source,ha:alert.ha};
    setNotifs(prev=>[n,...prev].slice(0,4));
    setBellCount(c=>c+1);
    setTimeout(()=>setNotifs(prev=>prev.filter(x=>x.id!==n.id)),9000);
  },[]);

  const dismissNotif = useCallback(id=>setNotifs(prev=>prev.filter(x=>x.id!==id)),[]);

  // New alert every ~10s (only when using demo data)
  useEffect(()=>{
    if (HAS_REAL_DATA) return;
    const id = setInterval(()=>{
      const a = genAlert(province !== 'all' ? province : null);
      a.ts = Date.now();
      setAlerts(prev => [a, ...prev].slice(0,50));
      setLiveCount(c=>c+1);
      addNotif(a);
      setHourly(prev=>{
        const copy = [...prev];
        const last = {...copy[copy.length-1]};
        last[a.severity] = (last[a.severity]||0)+1;
        copy[copy.length-1] = last;
        return copy;
      });
    }, 10000);
    return ()=>clearInterval(id);
  },[province]);

  const handleFirmsData = useCallback(data=>{
    setFirmsData(data);
    setAlerts(prev=>[...data,...prev].slice(0,60));
  },[]);

  const base = firmsData ? alerts.filter(a=>a.province==='FIRMS'||INITIAL.some(x=>x.id===a.id)) : alerts;
  const tsFrom = dateFrom ? new Date(dateFrom).getTime() : 0;
  const tsTo   = dateTo   ? new Date(dateTo + 'T23:59:59').getTime() : Infinity;
  const filtered = base.filter(a=>{
    if(filter!=='all' && a.severity!==filter) return false;
    if(a.ts && (a.ts < tsFrom || a.ts > tsTo)) return false;
    if(province==='all') return true;
    if(['AR','BR','BO'].includes(province)) return a.province?.startsWith(province);
    return a.province===province || (province==='PY'&&a.province==='PY') || (province==='UY'&&a.province==='UY');
  });

  const crit = filtered.filter(a=>a.severity==='critical').length;
  const high = filtered.filter(a=>a.severity==='high').length;
  const med  = filtered.filter(a=>a.severity==='medium').length;
  const totalHa = filtered.reduce((s,a)=>s+a.ha,0);
  const totalSev = crit + high + med || 1;
  const pctCrit = Math.round(crit/totalSev*100);
  const pctHigh = Math.round(high/totalSev*100);
  const pctMed  = Math.round(med/totalSev*100);

  const fwiData = useMemo(()=>{
    const map = {};
    filtered.forEach(a=>{
      if(a.frp > 0 && a.region){
        const r = a.region.split('/')[0].trim();
        if(!map[r] || a.frp > map[r].v)
          map[r] = {v:a.frp, col:a.frp>=80?'#ffb4ab':a.frp>=60?'#e7bf99':'#ffcc44', l:a.frp>=80?'Extremo':a.frp>=60?'Alto':'Moderado'};
      }
    });
    return Object.entries(map).sort((a,b)=>b[1].v-a[1].v).slice(0,4).map(([r,d])=>[r,d.l,Math.round(d.v),d.col]);
  },[filtered]);

  /* ── Mini map canvas ── */
  const mapRef = useRef(); const mapCtxRef = useRef();
  useEffect(()=>{
    if(!mapRef.current) return;
    const c = mapRef.current;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle='#000a1c'; ctx.fillRect(0,0,c.width,c.height);
    ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=.8;
    for(let x=0;x<c.width;x+=c.width/10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();}
    for(let y=0;y<c.height;y+=c.height/8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();}
    const toXY=(lat,lon)=>({x:(lon+82)/(82-34)*c.width, y:(7-lat)/(7+56)*c.height});
    filtered.slice(0,25).forEach(a=>{
      const p = toXY(a.lat,a.lon);
      const col=a.severity==='critical'?'#ffb4ab':a.severity==='high'?'#ffaa33':'#ffcc55';
      ctx.shadowColor=col; ctx.shadowBlur=7;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(p.x,p.y,a.severity==='critical'?4:3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    });
  },[filtered]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#020617',backgroundImage:'radial-gradient(circle at 50% 50%,#0a192f 0%,#020617 100%)'}}>

      {/* ── NAV — mismo estilo que admin/superadmin ── */}
      <nav style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.7rem 1.4rem',borderBottom:'1px solid rgba(68,71,77,.2)',background:'rgba(31,31,33,.92)',backdropFilter:'blur(20px)',flexShrink:0,position:'sticky',top:0,zIndex:50}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Logo size={22}/>
          <span style={{fontFamily:'Space Grotesk,sans-serif',fontWeight:700,letterSpacing:'-.04em',fontSize:'1.1rem',color:'#b9c7e4'}}>SPIYD</span>
          <span style={{color:'rgba(197,198,205,.2)',margin:'0 .2rem',fontSize:'.85rem'}}>/</span>
          <span style={{color:'rgba(197,198,205,.5)',fontSize:'.72rem',fontFamily:'JetBrains Mono,monospace',letterSpacing:'.04em'}}>Dashboard</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(161,212,148,.06)',border:'1px solid rgba(161,212,148,.18)',borderRadius:99,padding:'3px 10px'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'#a1d494',animation:'pulse 2s infinite'}}/>
            <span style={{color:'rgba(161,212,148,.7)',fontSize:'.63rem',fontFamily:'JetBrains Mono,monospace'}}>{HAS_REAL_DATA ? `${filtered.length} focos · 30d` : 'Sistema activo'}</span>
          </div>
          {(SPIYD_CONFIG.region_nombre || SPIYD_CONFIG.pais) && (
            <div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(185,199,228,.06)',border:'1px solid rgba(185,199,228,.15)',borderRadius:99,padding:'3px 10px'}}>
              <span style={{color:'rgba(185,199,228,.65)',fontSize:'.63rem',fontFamily:'JetBrains Mono,monospace'}}>
                📍 {SPIYD_CONFIG.region_nombre || (SPIYD_CONFIG.pais === 'argentina' ? 'Argentina' : 'Paraguay')}
              </span>
            </div>
          )}
          {liveCount>0 && (
            <button onClick={()=>setBellCount(0)} style={{
              position:'relative',display:'flex',alignItems:'center',justifyContent:'center',
              width:30,height:30,borderRadius:8,
              background:'rgba(255,180,171,.1)',border:'1px solid rgba(255,180,171,.22)',cursor:'pointer',
            }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffb4ab" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              {bellCount>0&&<span style={{position:'absolute',top:-4,right:-4,minWidth:14,height:14,background:'#ffb4ab',borderRadius:99,fontSize:'.48rem',fontWeight:700,color:'#1f1f21',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>{bellCount>9?'9+':bellCount}</span>}
            </button>
          )}
          <a href="/mapa" style={{display:'inline-flex',alignItems:'center',gap:5,color:'#a1d494',fontSize:'.7rem',textDecoration:'none',padding:'5px 12px',borderRadius:8,border:'1px solid rgba(161,212,148,.22)',background:'rgba(35,80,30,.35)',transition:'all .15s',fontFamily:'JetBrains Mono,monospace',fontWeight:500,letterSpacing:'.02em'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(35,80,30,.55)';e.currentTarget.style.borderColor='rgba(161,212,148,.45)'}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(35,80,30,.35)';e.currentTarget.style.borderColor='rgba(161,212,148,.22)'}}>
            Ver Mapa
          </a>
          <a href="/admin/" style={{color:'rgba(197,198,205,.4)',fontSize:'.7rem',textDecoration:'none',padding:'5px 10px',borderRadius:8,border:'1px solid rgba(143,144,151,.15)',background:'rgba(19,19,21,.6)',fontFamily:'JetBrains Mono,monospace',transition:'all .15s'}}
            onMouseEnter={e=>e.currentTarget.style.color='#e4e2e4'} onMouseLeave={e=>e.currentTarget.style.color='rgba(197,198,205,.4)'}>Admin</a>
          <a href="/logout" style={{color:'rgba(197,198,205,.3)',fontSize:'.7rem',textDecoration:'none',padding:'5px 10px',borderRadius:8,fontFamily:'JetBrains Mono,monospace',transition:'color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.color='#ffb4ab'} onMouseLeave={e=>e.currentTarget.style.color='rgba(197,198,205,.3)'}>Salir</a>
        </div>
      </nav>

      {/* ── Notifications ── */}
      <NotifStack notifs={notifs} onDismiss={dismissNotif}/>

      {/* ── BODY ── */}
      <div style={{flex:1,display:'flex',gap:'.7rem',padding:'.7rem',overflow:'hidden'}}>

        {/* ── LEFT: filters + list ── */}
        <div style={{width:272,flexShrink:0,display:'flex',flexDirection:'column',gap:'.7rem'}}>

          {/* Province/country filter */}
          <div className="g" style={{padding:'.8rem'}}>
            <div style={{color:'rgba(255,255,255,.32)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:6}}>Filtrar por región</div>
            <select className="ctrl" style={{width:'100%',marginBottom:7}} value={province} onChange={e=>setProvince(e.target.value)}>
              <option value="all">Todas las regiones</option>
              {['AR','BR','BO','PY','UY'].map(c=>(
                <optgroup key={c} label={c==='AR'?'🇦🇷 Argentina':c==='BR'?'🇧🇷 Brasil':c==='BO'?'🇧🇴 Bolivia':c==='PY'?'🇵🇾 Paraguay':'🇺🇾 Uruguay'}>
                  {PROVINCES.filter(p=>p.country===c).map(p=>(
                    <option key={p.value} value={p.value}>{p.label}</option>
                  ))}
                </optgroup>
              ))}
            </select>
            {/* Severity pills */}
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {[['all','Todas'],['critical','Críticas'],['high','Altas'],['medium','Medias']].map(([v,l])=>(
                <button key={v} onClick={()=>setFilter(v)} className={`tab ${filter===v?'tab-active':'tab-inactive'}`}>{l}</button>
              ))}
            </div>
            {/* Date range */}
            <div style={{marginTop:8,display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
              <div>
                <div style={{color:'rgba(255,255,255,.28)',fontSize:'.52rem',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>Desde</div>
                <input type="date" className="ctrl" style={{width:'100%',colorScheme:'dark'}} value={dateFrom} onChange={e=>setDateFrom(e.target.value)} />

              <div>

            </div>
            {(dateFrom||dateTo) && (
              <button onClick={()=>{setDateFrom('');setDateTo('');}} className="tab tab-inactive" style={{marginTop:5,width:'100%',textAlign:'center'}}>✕ Limpiar fechas</button>

          </div>

          {/* Alert count summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
            {[['Críticas',crit,'#ffb4ab'],['Altas',high,'#e7bf99'],['Medias',med,'#b9c7e4'],['Total ha',totalHa>0?(totalHa/1000).toFixed(1)+'k':'—','#a1d494']].map(([l,v,c])=>(
              <div key={l} className="g-dark" style={{padding:'.7rem .8rem'}}>
                <div style={{color:'rgba(255,255,255,.28)',fontSize:'.55rem',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>{l}</div>
                <div style={{color:c,fontSize:'1.2rem',fontWeight:600,letterSpacing:'-.05em'}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Criticality percentages */}
          <div className="g-dark" style={{padding:'.8rem .9rem'}}>
            <div style={{color:'rgba(255,255,255,.3)',fontSize:'.55rem',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:8}}>Distribución de criticidad</div>
            {[['CRÍTICO',pctCrit,'#ffb4ab',crit],['ALTO',pctHigh,'#e7bf99',high],['MEDIO',pctMed,'#b9c7e4',med]].map(([label,pct,col,count])=>(
              <div key={label} style={{marginBottom:6}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{color:'rgba(255,255,255,.45)',fontSize:'.58rem',fontWeight:500}}>{label}</span>

                  </span>
                </div>
                <div className="fwi-bar">
                  <div className="fwi-fill" style={{width:`${pct}%`,background:col,boxShadow:`0 0 6px ${col}55`}}/>

              </div>
            ))}
            {HAS_REAL_DATA && (
              <div style={{marginTop:7,paddingTop:7,borderTop:'1px solid rgba(255,255,255,.06)',color:'rgba(255,255,255,.25)',fontSize:'.58rem'}}>
                {filtered.length} focos · {dateFrom||dateTo ? `${dateFrom||'…'} → ${dateTo||'hoy'}` : 'últimos 30 días'}

          <div className="g" style={{flex:1,padding:'.6rem',overflowY:'auto'}}>

        </div>

          {/* Detail */}
          <div className="g" style={{flex:1,padding:'.9rem',display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:'.7rem',flexShrink:0}}>Detalle · Análisis IA</div>
            <DetailPanel alert={selected}/>
          </div>

          {/* FIRMS */}
          <FirmsPanel onData={handleFirmsData}/>

          {/* FWI */}
          <div className="g" style={{padding:'.9rem'}}>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:'.75rem'}}>FWI · Índice de riesgo por región</div>
            {(fwiData.length > 0 ? fwiData : [['Sin datos FWI',null,0,'#444']]).map(([r,l,v,c])=>(
              <div key={r} style={{marginBottom:'.65rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:'rgba(255,255,255,.5)',fontSize:'.63rem'}}>{r}</span>
                  <span style={{color:c,fontSize:'.63rem',fontWeight:500,fontFamily:'JetBrains Mono,monospace'}}>{v||'—'}</span>
                </div>
                {v > 0 && <div className="fwi-bar"><div className="fwi-fill" style={{width:`${Math.min(v,100)}%`,background:c}}/></div>}
                {l && <div style={{color:'rgba(255,255,255,.22)',fontSize:'.56rem',marginTop:2}}>{l}</div>}
              </div>
            ))}
          </div>

          {/* SMN Alertas */}
          {SPIYD_SMN.length > 0 && (
            <div className="g" style={{padding:'.9rem',maxHeight:180,overflowY:'auto'}}>
              <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:'.7rem'}}>
                Alertas SMN · {SPIYD_SMN.length}
              </div>
              {SPIYD_SMN.slice(0,5).map((a,i)=>{
                const col = a.severidad==='critical'?'#ffb4ab':a.severidad==='high'?'#e7bf99':'#b9c7e4';
                return (
                  <div key={i} style={{borderLeft:`2px solid ${col}`,paddingLeft:8,marginBottom:7}}>
                    <div style={{color:'rgba(255,255,255,.6)',fontSize:'.62rem',fontWeight:500}}>{a.region||a.fuente}</div>
                    {a.descripcion && <div style={{color:'rgba(255,255,255,.28)',fontSize:'.57rem',marginTop:1,lineHeight:1.4}}>{a.descripcion.slice(0,80)}{a.descripcion.length>80?'…':''}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
{% endraw %}
</body>
</html>
