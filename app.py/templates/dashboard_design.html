<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPIYD — Dashboard de Alertas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#44ffcc;--red:#ff6644;--yellow:#ffcc44;--blue:#88aaff;--purple:#cc88ff}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Poppins',sans-serif;background:#000308;color:white}
    #root{width:100%;height:100vh;display:flex;flex-direction:column}
    .mono{font-family:'JetBrains Mono',monospace}

    /* Glass */
    .g{position:relative;overflow:hidden;background:rgba(255,255,255,.028);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.10);border-radius:1rem}
    .g-dark{background:rgba(0,5,18,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:.75rem;overflow:hidden}

    /* Scrollbar */
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}

    /* Pulse */
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.7)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
    @keyframes notifOut{to{opacity:0;transform:translateX(22px);max-height:0;margin:0;padding:0}}
    .fade-in{animation:fadeIn .3s ease both}

    /* Severity */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:.56rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
    .b-critical{background:rgba(220,60,30,.18);color:#ff7055;border:1px solid rgba(220,60,30,.32)}
    .b-high    {background:rgba(255,160,30,.14);color:#ffaa44;border:1px solid rgba(255,160,30,.28)}
    .b-medium  {background:rgba(255,200,50,.12);color:#ffcc66;border:1px solid rgba(255,200,50,.22)}

    /* Input / Select */
    .ctrl{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:rgba(255,255,255,.75);font-family:'Poppins',sans-serif;font-size:.72rem;padding:7px 10px;border-radius:.55rem;outline:none;transition:border-color .2s}
    .ctrl:focus{border-color:rgba(255,255,255,.28)}
    .ctrl::placeholder{color:rgba(255,255,255,.28)}

    /* Tab */
    .tab{padding:6px 14px;border-radius:99px;font-size:.7rem;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:'Poppins',sans-serif}
    .tab-active{background:rgba(255,255,255,.12);color:white}
    .tab-inactive{background:transparent;color:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.08)}

    /* FWI bar */
    .fwi-bar{height:4px;border-radius:99px;background:rgba(255,255,255,.08)}
    .fwi-fill{height:100%;border-radius:99px;transition:width .6s}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ════ CONSTANTS ════ */
const SOURCES = ['NASA FIRMS','GOES-16','NOAA-20','METOP-B','AQUA','TERRA','INPE'];

const PROVINCES = [
  {country:'AR', label:'Argentina — todas', value:'AR'},
  {country:'AR', label:'Buenos Aires', value:'AR-B'},{country:'AR', label:'Chaco', value:'AR-H'},
  {country:'AR', label:'Corrientes', value:'AR-W'},{country:'AR', label:'Entre Ríos', value:'AR-E'},
  {country:'AR', label:'Formosa', value:'AR-P'},{country:'AR', label:'Misiones', value:'AR-N'},
  {country:'AR', label:'Santa Fe', value:'AR-S'},{country:'AR', label:'Santiago del Estero', value:'AR-G'},
  {country:'AR', label:'Salta', value:'AR-A'},{country:'AR', label:'Jujuy', value:'AR-Y'},
  {country:'BR', label:'Brasil — todas', value:'BR'},
  {country:'BR', label:'Mato Grosso', value:'BR-MT'},{country:'BR', label:'Pará', value:'BR-PA'},
  {country:'BR', label:'Mato Grosso do Sul', value:'BR-MS'},{country:'BR', label:'Rio Grande do Sul', value:'BR-RS'},
  {country:'BR', label:'São Paulo', value:'BR-SP'},{country:'BR', label:'Rondônia', value:'BR-RO'},
  {country:'BO', label:'Bolivia — todas', value:'BO'},
  {country:'BO', label:'Beni', value:'BO-B'},{country:'BO', label:'Santa Cruz', value:'BO-S'},
  {country:'PY', label:'Paraguay', value:'PY'},
  {country:'UY', label:'Uruguay', value:'UY'},
];

const REGION_MAP = {
  'AR-H':'Chaco, AR','AR-W':'Corrientes, AR','AR-E':'Entre Ríos, AR','AR-P':'Formosa, AR',
  'AR-N':'Misiones, AR','AR-B':'Buenos Aires, AR','AR-S':'Santa Fe, AR','AR-G':'Santiago del Estero, AR',
  'AR-A':'Salta, AR','AR-Y':'Jujuy, AR',
  'BR-MT':'Mato Grosso, BR','BR-PA':'Pará, BR','BR-MS':'Mato Grosso do Sul, BR','BR-RS':'Rio Grande do Sul, BR',
  'BR-SP':'São Paulo, BR','BR-RO':'Rondônia, BR',
  'BO-B':'Beni, BO','BO-S':'Santa Cruz, BO',
  'PY':'Paraguay','UY':'Uruguay',
};

const COORDS_BY_PROV = {
  'AR-H':[-24.1,-61.5],'AR-W':[-28.5,-57.2],'AR-E':[-31.8,-59.6],'AR-P':[-23.9,-60.8],
  'AR-N':[-26.8,-55.0],'AR-B':[-36.6,-60.9],'AR-S':[-30.7,-60.7],'AR-G':[-27.8,-64.3],
  'AR-A':[-24.8,-65.4],'AR-Y':[-23.5,-65.2],
  'BR-MT':[-10.2,-52.4],'BR-PA':[-3.8,-55.1],'BR-MS':[-20.3,-55.8],'BR-RS':[-29.4,-53.1],
  'BR-SP':[-22.5,-47.5],'BR-RO':[-11.5,-62.0],
  'BO-B':[-14.9,-63.2],'BO-S':[-17.2,-63.6],
  'PY':[-23.4,-58.4],'UY':[-32.5,-55.7],
};

/* ── Demo alert generator ── */
let alertCounter = 2048;
function genAlert(provincePick) {
  const provinces = provincePick && provincePick !== 'AR' && provincePick !== 'BR' && provincePick !== 'BO'
    ? [provincePick]
    : Object.keys(COORDS_BY_PROV);
  const prov = provinces[Math.floor(Math.random() * provinces.length)];
  const [lat, lon] = COORDS_BY_PROV[prov] || [-20, -60];
  const sev = Math.random() < .2 ? 'critical' : Math.random() < .5 ? 'high' : 'medium';
  return {
    id: `SPY-${(alertCounter++).toString().padStart(4,'0')}`,
    region: REGION_MAP[prov] || 'Cono Sur',
    province: prov,
    lat: lat + (Math.random()-.5)*2,
    lon: lon + (Math.random()-.5)*2,
    severity: sev,
    source: SOURCES[Math.floor(Math.random()*SOURCES.length)],
    ha: Math.floor(50 + Math.random()*4800),
    confidence: Math.floor(68 + Math.random()*30),
    frp: parseFloat((5 + Math.random()*180).toFixed(1)),  // Fire Radiative Power (FIRMS field)
    temp: Math.floor(320 + Math.random()*280),
    ts: Date.now() - Math.floor(Math.random()*3600000*4),
    status: Math.random()<.15?'active':'monitoring',
    daynight: Math.random()<.5?'D':'N',
  };
}

const INITIAL = Array.from({length:22}, ()=>genAlert(null));

/* ── Hourly trend ── */
const HOURLY_24 = Array.from({length:24}, (_,i) => ({
  h: i,
  critical: Math.floor(Math.random()*4 + (i>12&&i<20?3:0)),
  high: Math.floor(Math.random()*8 + 2),
  medium: Math.floor(Math.random()*10 + 3),
}));

function Logo({size=24}) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="17" stroke="rgba(255,255,255,.38)" strokeWidth="1.2"/>
      <ellipse cx="20" cy="20" rx="10" ry="5" stroke="rgba(255,255,255,.22)" strokeWidth="1" transform="rotate(-35 20 20)"/>
      <circle cx="20" cy="20" r="4.2" fill="rgba(255,255,255,.90)"/>
      <circle cx="33" cy="12" r="2.6" fill="rgba(255,255,255,.72)"/>
      <circle cx="8"  cy="30" r="1.4" fill="rgba(255,255,255,.40)"/>
    </svg>
  );
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return `${Math.floor(d/1000)}s`;
  if (d < 3600000) return `${Math.floor(d/60000)}m`;
  return `${Math.floor(d/3600000)}h`;
}

/* ═══════════════ TREND CHART ═══════════════ */
function TrendChart({data, metric}) {
  const ref = useRef(); const chartRef = useRef();

  useEffect(()=>{
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const labels = data.map(d => d.h.toString().padStart(2,'0')+':00');
    const ds = metric === 'all'
      ? [
          {label:'Críticas',data:data.map(d=>d.critical),borderColor:'#ff6644',backgroundColor:'rgba(255,100,68,.08)',fill:true,tension:.4,pointRadius:2,pointHoverRadius:4},
          {label:'Altas',   data:data.map(d=>d.high),    borderColor:'#ffaa44',backgroundColor:'rgba(255,170,68,.06)',fill:true,tension:.4,pointRadius:2,pointHoverRadius:4},
          {label:'Medias',  data:data.map(d=>d.medium),  borderColor:'#88aaff',backgroundColor:'rgba(136,170,255,.05)',fill:true,tension:.4,pointRadius:2,pointHoverRadius:4},
        ]
      : [{
          label: metric==='critical'?'Críticas':metric==='high'?'Altas':'Medias',
          data: data.map(d=>d[metric]),
          borderColor: metric==='critical'?'#ff6644':metric==='high'?'#ffaa44':'#88aaff',
          backgroundColor: metric==='critical'?'rgba(255,100,68,.12)':metric==='high'?'rgba(255,170,68,.10)':'rgba(136,170,255,.08)',
          fill:true, tension:.4, pointRadius:2, pointHoverRadius:4,
        }];

    chartRef.current = new Chart(ref.current, {
      type:'line',
      data:{labels, datasets:ds},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        interaction:{intersect:false, mode:'index'},
        plugins:{
          legend:{display:metric==='all',labels:{color:'rgba(255,255,255,.45)',font:{family:'Poppins',size:11},boxWidth:10,padding:14}},
          tooltip:{
            backgroundColor:'rgba(0,5,20,.88)',borderColor:'rgba(255,255,255,.14)',borderWidth:1,
            titleColor:'white',bodyColor:'rgba(255,255,255,.6)',titleFont:{family:'Poppins',weight:'500',size:12},
            bodyFont:{family:'Poppins',size:11},padding:10,cornerRadius:8,
          },
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.3)',font:{family:'JetBrains Mono',size:10},maxRotation:0,autoSkip:true,maxTicksLimit:8}},
          y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.3)',font:{family:'Poppins',size:10}},beginAtZero:true},
        },
      },
    });
    return ()=>chartRef.current?.destroy();
  },[data, metric]);

  return <canvas ref={ref} width={900} height={140} style={{width:'100%',height:'100%',display:'block'}}/>;
}

/* ═══════════════ FIRMS PANEL ═══════════════ */
function FirmsPanel({onData}) {
  const [key,   setKey]   = useState(localStorage.getItem('firms_key')||'');
  const [status, setStatus] = useState('idle'); // idle | loading | ok | error
  const [msg,   setMsg]   = useState('');
  const [count, setCount] = useState(0);

  function save() { localStorage.setItem('firms_key', key); }

  async function fetchFIRMS() {
    if (!key.trim()) return setMsg('Ingresá tu MAP_KEY de NASA FIRMS.');
    save();
    setStatus('loading'); setMsg('');
    // South America bounding box: W=-82, S=-56, E=-34, N=-7
    const url = `https://firms.modaps.eosdis.nasa.gov/api/area/json/${key.trim()}/VIIRS_SNPP_NRT/-82,-56,-34,-7/1`;
    try {
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} — verificá tu MAP_KEY`);
      const json = await res.json();
      if (!Array.isArray(json)) throw new Error('Respuesta inesperada de FIRMS');
      // Map FIRMS fields to SPIYD alert format
      const alerts = json.slice(0,40).map((f,i)=>({
        id:`FIRMS-${i.toString().padStart(4,'0')}`,
        region: `${f.latitude?.toFixed(2)}°S, ${Math.abs(f.longitude)?.toFixed(2)}°W`,
        province: 'FIRMS',
        lat: parseFloat(f.latitude), lon: parseFloat(f.longitude),
        severity: parseFloat(f.confidence)>=80?'critical':parseFloat(f.confidence)>=60?'high':'medium',
        source: f.satellite || 'VIIRS',
        ha: Math.round((parseFloat(f.scan)||1)*(parseFloat(f.track)||1)*100),
        confidence: parseFloat(f.confidence)||70,
        frp: parseFloat(f.frp)||0,
        temp: parseFloat(f.bright_ti4)||400,
        ts: new Date(f.acq_date+' '+f.acq_time?.slice(0,2)+':'+f.acq_time?.slice(2)).getTime()||Date.now(),
        status:'active', daynight: f.daynight||'D',
      }));
      setCount(alerts.length);
      setStatus('ok');
      setMsg(`✓ ${alerts.length} focos detectados por VIIRS en las últimas 24 h`);
      onData(alerts);
    } catch(e) {
      setStatus('error');
      setMsg(`Error: ${e.message}`);
    }
  }

  return (
    <div className="g" style={{padding:'1rem 1.2rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:'.9rem'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#88aaff" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 14.14 14.14"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
        <span style={{color:'white',fontSize:'.75rem',fontWeight:500,letterSpacing:'-.02em'}}>NASA FIRMS en vivo</span>
        {status==='ok' && <div style={{marginLeft:'auto',width:7,height:7,borderRadius:'50%',background:'#44ffcc',animation:'pulse 1.8s infinite'}}/>}
      </div>

      <div style={{display:'flex',gap:6,marginBottom:7}}>
        <input className="ctrl" style={{flex:1,fontFamily:'JetBrains Mono, monospace',fontSize:'.68rem',letterSpacing:'.04em'}}
          type="text" placeholder="Tu NASA FIRMS MAP_KEY…" value={key}
          onChange={e=>setKey(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&fetchFIRMS()}/>
        <button onClick={fetchFIRMS} disabled={status==='loading'} style={{
          padding:'7px 14px',background:status==='ok'?'rgba(68,255,204,.12)':'rgba(255,255,255,.09)',
          border:`1px solid ${status==='ok'?'rgba(68,255,204,.3)':'rgba(255,255,255,.14)'}`,
          borderRadius:'.55rem',color:'white',fontFamily:'Poppins',fontSize:'.7rem',cursor:'pointer',
          whiteSpace:'nowrap',transition:'all .15s',
        }}>
          {status==='loading'
            ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" style={{animation:'spin .7s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            : status==='ok' ? '↻ Actualizar' : 'Conectar'
          }
        </button>
      </div>

      {msg && <div style={{color:status==='error'?'#ff7055':status==='ok'?'#44ffcc':'rgba(255,255,255,.45)',fontSize:'.65rem',lineHeight:1.4}}>{msg}</div>}

      {!key && <div style={{color:'rgba(255,255,255,.28)',fontSize:'.62rem',lineHeight:1.55,marginTop:5}}>
        Obtené tu clave gratuita en <span style={{color:'#88aaff',cursor:'pointer'}} onClick={()=>window.open('https://firms.modaps.eosdis.nasa.gov/api/','_blank')}>firms.modaps.eosdis.nasa.gov/api</span>
      </div>}
    </div>
  );
}

/* ═══════════════ NOTIFICATION TOAST ═══════════════ */
function NotifStack({notifs, onDismiss}) {
  return (
    <div style={{position:'fixed',top:'4rem',right:'1rem',zIndex:9999,display:'flex',flexDirection:'column',gap:7,pointerEvents:'none'}}>
      {notifs.map(n=>{
        const col = n.sev==='critical'?'#ff5533':n.sev==='high'?'#ffaa44':'#ffcc55';
        return (
          <div key={n.id} style={{
            pointerEvents:'all',width:288,
            background:'rgba(0,5,22,.93)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',
            borderRadius:'.9rem',padding:'.8rem .95rem',
            boxShadow:'0 8px 28px rgba(0,0,0,.55)',
            borderLeft:`3px solid ${col}`,
            animation:'slideIn .3s cubic-bezier(.16,1,.3,1) both',
          }}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:col,flexShrink:0}}/>
                <span style={{color:'white',fontSize:'.72rem',fontWeight:500}}>Nuevo foco · {n.sev.toUpperCase()}</span>
              </div>
              <button onClick={()=>onDismiss(n.id)} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',cursor:'pointer',fontSize:13,padding:0,lineHeight:1}}>✕</button>
            </div>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:'.65rem',lineHeight:1.45}}>
              <span style={{color:'rgba(255,255,255,.75)',fontWeight:500}}>{n.region}</span><br/>
              {n.ha?.toLocaleString()} ha · {n.source}
            </div>
            <div style={{display:'flex',gap:6,marginTop:7}}>
              <button onClick={()=>onDismiss(n.id)} style={{flex:1,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',color:'rgba(255,255,255,.55)',fontFamily:'Poppins',fontSize:'.6rem',padding:'4px 0',borderRadius:99,cursor:'pointer'}}>Ignorar</button>
              <button style={{flex:1,background:'rgba(255,255,255,.07)',border:`1px solid ${col}44`,color:col,fontFamily:'Poppins',fontSize:'.6rem',padding:'4px 0',borderRadius:99,cursor:'pointer'}}>Ver detalle</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════ ALERT ROW ═══════════════ */
function AlertRow({alert, selected, onClick}) {
  const col = {critical:'#ff6644',high:'#ffaa44',medium:'#ffcc66'}[alert.severity];
  return (
    <div onClick={onClick} className="fade-in" style={{
      padding:'.8rem .9rem',borderRadius:'.7rem',cursor:'pointer',
      background:selected?'rgba(255,255,255,.07)':'transparent',
      border:`1px solid ${selected?'rgba(255,255,255,.16)':'transparent'}`,
      transition:'all .12s', marginBottom:3,
    }}
    onMouseEnter={e=>!selected&&(e.currentTarget.style.background='rgba(255,255,255,.04)')}
    onMouseLeave={e=>!selected&&(e.currentTarget.style.background='transparent')}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
        <div style={{width:5,height:5,borderRadius:'50%',background:col,flexShrink:0,
          animation:alert.status==='active'?'pulse 1.4s infinite':undefined}}/>
        <span style={{color:'white',fontSize:'.73rem',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{alert.region}</span>
        <span className={`badge b-${alert.severity}`}>{alert.severity}</span>
      </div>
      <div style={{display:'flex',gap:10,paddingLeft:12}}>
        <span style={{color:'rgba(255,255,255,.3)',fontSize:'.6rem',fontFamily:'JetBrains Mono,monospace'}}>{alert.id}</span>
        <span style={{color:'rgba(255,255,255,.28)',fontSize:'.6rem'}}>{alert.source}</span>
        <span style={{color:'rgba(255,255,255,.22)',fontSize:'.6rem',marginLeft:'auto'}}>{timeAgo(alert.ts)}</span>
      </div>
    </div>
  );
}

/* ═══════════════ DETAIL ═══════════════ */
function DetailPanel({alert}) {
  const [aiText, setAiText]     = useState('');
  const [loading, setLoading]   = useState(false);

  useEffect(()=>{
    if(!alert) return;
    setAiText(''); setLoading(true);
    const prompt = `Sos el sistema IA de SPIYD. En 3 oraciones directas y operativas, describí el riesgo y recomendación para: incendio ${alert.severity} en ${alert.region}, ${alert.ha} ha, temperatura ${alert.temp}K, FRP ${alert.frp} MW, detectado por ${alert.source}. Español, sin intro.`;
    window.claude?.complete(prompt)
      .then(r=>{setAiText(r);setLoading(false);})
      .catch(()=>{setAiText('Riesgo de propagación elevado por condiciones meteorológicas desfavorables en la región. Se recomienda activación inmediata de brigadas terrestres y vigilancia aérea en un radio de 15 km. Coordinar con defensa civil provincial para posible evacuación preventiva de localidades colindantes.');setLoading(false);});
  },[alert?.id]);

  if(!alert) return <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.18)',fontSize:'.78rem'}}>Seleccioná una alerta para ver el análisis</div>;

  const col = {critical:'#ff6644',high:'#ffaa44',medium:'#ffcc66'}[alert.severity];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'.85rem',overflowY:'auto',flex:1,paddingRight:2}}>
      <div>
        <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:5}}>Alerta seleccionada</div>
        <div style={{fontSize:'1rem',fontWeight:500,letterSpacing:'-.03em',marginBottom:5}}>{alert.region}</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <span className={`badge b-${alert.severity}`}>{alert.severity}</span>
          <span style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:99,padding:'2px 9px',fontSize:'.55rem',color:'rgba(255,255,255,.45)',fontWeight:500}}>{alert.status}</span>
          <span style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.1)',borderRadius:99,padding:'2px 9px',fontSize:'.55rem',color:'rgba(255,255,255,.45)',fontWeight:500}}>{alert.daynight==='D'?'Diurno':'Nocturno'}</span>
        </div>
      </div>

      {/* Metrics 2-col */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {[
          ['Superficie',`${alert.ha.toLocaleString()} ha`],
          ['FRP (FIRMS)',`${alert.frp} MW`],
          ['Temperatura',`${alert.temp} K`],
          ['Confianza',`${alert.confidence}%`],
          ['Latitud',`${alert.lat.toFixed(3)}°`],
          ['Longitud',`${alert.lon.toFixed(3)}°`],
        ].map(([k,v])=>(
          <div key={k} className="g-dark" style={{padding:'.7rem .85rem'}}>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.55rem',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>{k}</div>
            <div className="mono" style={{color:'white',fontSize:'.8rem',fontWeight:500}}>{v}</div>
          </div>
        ))}
      </div>

      {/* AI */}
      <div className="g-dark" style={{padding:'.9rem',borderColor:'rgba(100,140,255,.18)'}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
          <div style={{width:18,height:18,borderRadius:'50%',background:'rgba(100,140,255,.15)',border:'1px solid rgba(100,140,255,.28)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#88aaff" strokeWidth="2" strokeLinecap="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
          </div>
          <span style={{color:'rgba(255,255,255,.4)',fontSize:'.58rem',letterSpacing:'.12em',textTransform:'uppercase',fontWeight:500}}>Análisis IA · Claude</span>
        </div>
        {loading
          ? <div style={{color:'rgba(255,255,255,.2)',fontSize:'.72rem',fontStyle:'italic'}}>Analizando condiciones…</div>
          : <p style={{color:'rgba(255,255,255,.6)',fontSize:'.73rem',lineHeight:1.65}}>{aiText}</p>
        }
      </div>

      {/* Actions */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['Activar Brigada','Ver en Mapa','Exportar Informe'].map(a=>(
          <button key={a} style={{
            flex:1,minWidth:0,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',
            color:'rgba(255,255,255,.65)',fontFamily:'Poppins',fontSize:'.65rem',fontWeight:500,
            padding:'7px 8px',borderRadius:99,cursor:'pointer',transition:'all .14s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.14)';e.currentTarget.style.color='white';}}
          onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.07)';e.currentTarget.style.color='rgba(255,255,255,.65)';}}>
            {a}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
function App() {
  const [alerts, setAlerts]       = useState(INITIAL);
  const [selected, setSelected]   = useState(INITIAL[0]);
  const [filter, setFilter]       = useState('all');
  const [province, setProvince]   = useState('all');
  const [chartMetric, setChartMetric] = useState('all');
  const [chartTab, setChartTab]   = useState('trend');
  const [firmsData, setFirmsData] = useState(null);
  const [liveCount, setLiveCount] = useState(0);
  const [hourly, setHourly]       = useState(HOURLY_24);
  const [notifs, setNotifs]       = useState([]);
  const [bellCount, setBellCount] = useState(0);

  const addNotif = useCallback((alert)=>{
    const n = {id:Date.now(),region:alert.region,sev:alert.severity,source:alert.source,ha:alert.ha};
    setNotifs(prev=>[n,...prev].slice(0,4));
    setBellCount(c=>c+1);
    setTimeout(()=>setNotifs(prev=>prev.filter(x=>x.id!==n.id)),9000);
  },[]);

  const dismissNotif = useCallback(id=>setNotifs(prev=>prev.filter(x=>x.id!==id)),[]);

  // New alert every ~10s
  useEffect(()=>{
    const id = setInterval(()=>{
      const a = genAlert(province !== 'all' ? province : null);
      a.ts = Date.now();
      setAlerts(prev => [a, ...prev].slice(0,50));
      setLiveCount(c=>c+1);
      addNotif(a);
      setHourly(prev=>{
        const copy = [...prev];
        const last = {...copy[copy.length-1]};
        last[a.severity] = (last[a.severity]||0)+1;
        copy[copy.length-1] = last;
        return copy;
      });
    }, 10000);
    return ()=>clearInterval(id);
  },[province]);

  const handleFirmsData = useCallback(data=>{
    setFirmsData(data);
    setAlerts(prev=>[...data,...prev].slice(0,60));
  },[]);

  const base = firmsData ? alerts.filter(a=>a.province==='FIRMS'||INITIAL.some(x=>x.id===a.id)) : alerts;
  const filtered = base.filter(a=>{
    if(filter!=='all' && a.severity!==filter) return false;
    if(province==='all') return true;
    if(['AR','BR','BO'].includes(province)) return a.province?.startsWith(province);
    return a.province===province || (province==='PY'&&a.province==='PY') || (province==='UY'&&a.province==='UY');
  });

  const crit = filtered.filter(a=>a.severity==='critical').length;
  const high = filtered.filter(a=>a.severity==='high').length;
  const med  = filtered.filter(a=>a.severity==='medium').length;
  const totalHa = filtered.reduce((s,a)=>s+a.ha,0);

  /* ── Mini map canvas ── */
  const mapRef = useRef(); const mapCtxRef = useRef();
  useEffect(()=>{
    if(!mapRef.current) return;
    const c = mapRef.current;
    const ctx = c.getContext('2d');
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle='#000a1c'; ctx.fillRect(0,0,c.width,c.height);
    ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=.8;
    for(let x=0;x<c.width;x+=c.width/10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();}
    for(let y=0;y<c.height;y+=c.height/8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();}
    const toXY=(lat,lon)=>({x:(lon+82)/(82-34)*c.width, y:(7-lat)/(7+56)*c.height});
    filtered.slice(0,25).forEach(a=>{
      const p = toXY(a.lat,a.lon);
      const col=a.severity==='critical'?'#ff5533':a.severity==='high'?'#ffaa33':'#ffcc55';
      ctx.shadowColor=col; ctx.shadowBlur=7;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(p.x,p.y,a.severity==='critical'?4:3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    });
  },[filtered]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#000308'}}>

      {/* ── NAV ── */}
      <nav style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.75rem 1.4rem',borderBottom:'1px solid rgba(255,255,255,.07)',background:'rgba(0,3,12,.92)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Logo size={24}/>
          <span style={{fontWeight:600,letterSpacing:'-.05em',fontSize:'.95rem'}}>spiyd</span>
          <span style={{color:'rgba(255,255,255,.2)',margin:'0 .3rem'}}>/</span>
          <span style={{color:'rgba(255,255,255,.42)',fontSize:'.75rem'}}>Dashboard</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',borderRadius:99,padding:'4px 12px'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'#44ffcc',animation:'pulse 2s infinite'}}/>
            <span style={{color:'rgba(255,255,255,.5)',fontSize:'.65rem'}}>7 satélites activos</span>
          </div>
          {liveCount>0 && (
            <button onClick={()=>setBellCount(0)} style={{
              position:'relative',display:'flex',alignItems:'center',justifyContent:'center',
              width:30,height:30,borderRadius:'50%',
              background:'rgba(255,100,68,.15)',border:'1px solid rgba(255,100,68,.28)',cursor:'pointer',
            }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ff8866" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              {bellCount>0&&<span style={{position:'absolute',top:-3,right:-3,minWidth:14,height:14,background:'#ff5533',borderRadius:99,fontSize:'.48rem',fontWeight:700,color:'white',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px',border:'2px solid #000308'}}>{bellCount>9?'9+':bellCount}</span>}
            </button>
          )}
          <a href="/mapa" style={{display:'inline-flex',alignItems:'center',gap:5,color:'#44ffcc',fontSize:'.72rem',textDecoration:'none',padding:'5px 13px',borderRadius:99,border:'1px solid rgba(68,255,204,.25)',background:'rgba(68,255,204,.07)',transition:'all .15s',fontWeight:500}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(68,255,204,.15)';e.currentTarget.style.borderColor='rgba(68,255,204,.5)'}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(68,255,204,.07)';e.currentTarget.style.borderColor='rgba(68,255,204,.25)'}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            Ver Mapa
          </a>
          <a href="/admin/" style={{color:'rgba(255,255,255,.35)',fontSize:'.72rem',textDecoration:'none',padding:'4px 10px',borderRadius:99,transition:'color .15s'}}
            onMouseEnter={e=>e.target.style.color='white'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,.35)'}>Admin</a>
          <a href="/logout" style={{color:'rgba(255,255,255,.25)',fontSize:'.72rem',textDecoration:'none',padding:'4px 10px',borderRadius:99,transition:'color .15s'}}
            onMouseEnter={e=>e.target.style.color='#ff8a80'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,.25)'}>Salir</a>
        </div>
      </nav>

      {/* ── Notifications ── */}
      <NotifStack notifs={notifs} onDismiss={dismissNotif}/>

      {/* ── BODY ── */}
      <div style={{flex:1,display:'flex',gap:'.7rem',padding:'.7rem',overflow:'hidden'}}>

        {/* ── LEFT: filters + list ── */}
        <div style={{width:272,flexShrink:0,display:'flex',flexDirection:'column',gap:'.7rem'}}>

          {/* Province/country filter */}
          <div className="g" style={{padding:'.8rem'}}>
            <div style={{color:'rgba(255,255,255,.32)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:6}}>Filtrar por región</div>
            <select className="ctrl" style={{width:'100%',marginBottom:7}} value={province} onChange={e=>setProvince(e.target.value)}>
              <option value="all">Todas las regiones</option>
              {['AR','BR','BO','PY','UY'].map(c=>(
                <optgroup key={c} label={c==='AR'?'🇦🇷 Argentina':c==='BR'?'🇧🇷 Brasil':c==='BO'?'🇧🇴 Bolivia':c==='PY'?'🇵🇾 Paraguay':'🇺🇾 Uruguay'}>
                  {PROVINCES.filter(p=>p.country===c).map(p=>(
                    <option key={p.value} value={p.value}>{p.label}</option>
                  ))}
                </optgroup>
              ))}
            </select>
            {/* Severity pills */}
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {[['all','Todas'],['critical','Críticas'],['high','Altas'],['medium','Medias']].map(([v,l])=>(
                <button key={v} onClick={()=>setFilter(v)} className={`tab ${filter===v?'tab-active':'tab-inactive'}`}>{l}</button>
              ))}
            </div>
          </div>

          {/* Alert count summary */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
            {[['Críticas',crit,'#ff6644'],['Altas',high,'#ffaa44'],['Medias',med,'#88aaff'],['Total ha',(totalHa/1000).toFixed(0)+'k','#44ffcc']].map(([l,v,c])=>(
              <div key={l} className="g-dark" style={{padding:'.7rem .8rem'}}>
                <div style={{color:'rgba(255,255,255,.28)',fontSize:'.55rem',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>{l}</div>
                <div style={{color:c,fontSize:'1.2rem',fontWeight:600,letterSpacing:'-.05em'}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Alert list */}
          <div className="g" style={{flex:1,padding:'.6rem',overflowY:'auto'}}>
            <div style={{color:'rgba(255,255,255,.25)',fontSize:'.58rem',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:6,padding:'0 .2rem'}}>
              {filtered.length} alertas
            </div>
            {filtered.map(a=>(
              <AlertRow key={a.id} alert={a} selected={selected?.id===a.id} onClick={()=>setSelected(a)}/>
            ))}
          </div>
        </div>

        {/* ── CENTER: chart + map ── */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:'.7rem',minWidth:0}}>

          {/* Chart panel */}
          <div className="g" style={{height:220,padding:'1rem',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.8rem',flexShrink:0}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{color:'rgba(255,255,255,.35)',fontSize:'.58rem',letterSpacing:'.16em',textTransform:'uppercase'}}>Detecciones últimas 24 h</span>
              </div>
              <div style={{display:'flex',gap:5}}>
                {[['all','Todas'],['critical','Críticas'],['high','Altas'],['medium','Medias']].map(([v,l])=>(
                  <button key={v} onClick={()=>setChartMetric(v)} className={`tab ${chartMetric===v?'tab-active':'tab-inactive'}`} style={{fontSize:'.6rem',padding:'4px 10px'}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{flex:1,minHeight:0}}>
              <TrendChart data={hourly} metric={chartMetric}/>
            </div>
          </div>

          {/* Map */}
          <div className="g" style={{flex:1,padding:'1rem',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.8rem',flexShrink:0}}>
              <span style={{color:'rgba(255,255,255,.35)',fontSize:'.58rem',letterSpacing:'.16em',textTransform:'uppercase'}}>Distribución espacial · {filtered.length} focos</span>
              <a href="/mapa" style={{color:'rgba(255,255,255,.35)',fontSize:'.65rem',textDecoration:'none',border:'1px solid rgba(255,255,255,.1)',borderRadius:99,padding:'4px 12px',transition:'color .15s'}} onMouseEnter={e=>e.target.style.color='white'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,.35)'}>Mapa completo →</a>
            </div>
            <div style={{flex:1,borderRadius:'.6rem',overflow:'hidden',background:'#000a1c',minHeight:0}}>
              <canvas ref={mapRef} width={600} height={300} style={{width:'100%',height:'100%',display:'block'}}/>
            </div>
          </div>
        </div>

        {/* ── RIGHT: detail + firms + satellites ── */}
        <div style={{width:258,flexShrink:0,display:'flex',flexDirection:'column',gap:'.7rem'}}>

          {/* Detail */}
          <div className="g" style={{flex:1,padding:'.9rem',display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:'.7rem',flexShrink:0}}>Detalle · Análisis IA</div>
            <DetailPanel alert={selected}/>
          </div>

          {/* FIRMS */}
          <FirmsPanel onData={handleFirmsData}/>

          {/* FWI */}
          <div className="g" style={{padding:'.9rem'}}>
            <div style={{color:'rgba(255,255,255,.28)',fontSize:'.56rem',letterSpacing:'.16em',textTransform:'uppercase',marginBottom:'.75rem'}}>FWI · Índice de riesgo</div>
            {[['Chaco, AR','Extremo',92,'#ff5533'],['Corrientes, AR','Alto',77,'#ffaa44'],['Mato Grosso, BR','Alto',71,'#ffaa44'],['Beni, BO','Moderado',55,'#ffcc44']].map(([r,l,v,c])=>(
              <div key={r} style={{marginBottom:'.65rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{color:'rgba(255,255,255,.5)',fontSize:'.63rem'}}>{r}</span>
                  <span style={{color:c,fontSize:'.63rem',fontWeight:500,fontFamily:'JetBrains Mono,monospace'}}>{v}</span>
                </div>
                <div className="fwi-bar"><div className="fwi-fill" style={{width:`${v}%`,background:c}}/></div>
                <div style={{color:'rgba(255,255,255,.22)',fontSize:'.56rem',marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
