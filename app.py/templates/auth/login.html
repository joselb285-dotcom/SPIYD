<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SPIYD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --orange: #f97316; --muted: #8b949e; --card: #161b22; --border: rgba(255,255,255,0.07); }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(ellipse at 30% 50%, rgba(249,115,22,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 20%, rgba(34,197,94,0.06) 0%, transparent 50%),
                  #0a0f1e;
      display: flex; align-items: center; justify-content: center; color: #e2e8f0;
    }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-logo {
      text-align: center; font-size: 2rem; font-weight: 900; margin-bottom: 8px;
      background: linear-gradient(90deg, var(--orange), #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-sub { text-align: center; color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .login-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
    .form-control {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: #e2e8f0; border-radius: 8px; padding: 11px 14px; font-size: 0.92rem;
      transition: border-color .2s; outline: none;
    }
    .form-control:focus { border-color: var(--orange); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(249,115,22,0.12); }
    .form-control::placeholder { color: var(--muted); }
    .form-group { margin-bottom: 18px; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; }
    .input-icon-wrap input { padding-left: 38px; }
    .check-label { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--muted); cursor: pointer; }
    .check-label input { accent-color: var(--orange); width: 15px; height: 15px; cursor: pointer; }
    .btn-login {
      width: 100%; background: var(--orange); color: #fff; border: none;
      border-radius: 10px; padding: 13px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s, transform .1s;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3); margin-top: 6px;
    }
    .btn-login:hover { opacity: .88; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .alert-error { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; font-size: 0.88rem; margin-bottom: 18px; }
    .back-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
    .back-link a { color: var(--orange); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">🔥 SPIYD</div>
    <div class="login-sub">Sistema de Prevención de Incendios y Deforestaciones</div>

    <div class="login-card">
      <div class="login-title">Iniciar Sesión</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert-error"><i class="fas fa-exclamation-circle me-2"></i>{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label">Usuario o Email</label>
          <div class="input-icon-wrap">
            <i class="fas fa-user"></i>
            <input class="form-control" type="text" name="username" placeholder="usuario o correo" required autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock"></i>
            <input class="form-control" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <div class="form-group">
          <label class="check-label">
            <input type="checkbox" name="remember"> Mantener sesión iniciada
          </label>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-right-to-bracket me-2"></i>Ingresar al Sistema
        </button>
      </form>
    </div>

    <div class="back-link">
      <a href="/"><i class="fas fa-arrow-left me-1"></i>Volver al inicio</a>
    </div>
  </div>
</body>
</html>
