<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SPIYD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: hsl(0 0% 4%);
      --surface: hsl(0 0% 8%);
      --text: hsl(0 0% 96%);
      --muted: hsl(0 0% 53%);
      --stroke: hsl(0 0% 12%);
      --accent-a: #0EA5E9;
      --accent-b: #06B6D4;
    }
    html, body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }
    body { display: flex; align-items: center; justify-content: center; position: relative; }

    /* Canvas background */
    #bg-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* Back link */
    #back-link {
      position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10;
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; color: var(--muted); text-decoration: none;
      padding: 0.5rem 1rem; border-radius: 9999px;
      border: 1px solid var(--stroke); background: var(--surface);
      backdrop-filter: blur(12px);
      transition: color 0.2s, border-color 0.2s;
      opacity: 0;
    }
    #back-link:hover { color: var(--text); border-color: rgba(14,165,233,0.4); }

    /* Wrap */
    #login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 1.5rem;
      opacity: 0;
    }

    /* Logo */
    .login-logo {
      text-align: center; margin-bottom: 2.5rem;
    }
    .logo-ring {
      display: inline-flex; align-items: center; justify-content: center;
      width: 3rem; height: 3rem; border-radius: 50%;
      background: var(--bg);
      position: relative; margin-bottom: 1rem;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%; padding: 1.5px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
    }
    .logo-letters {
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: 0.9rem; color: var(--text);
    }
    .login-title-text {
      font-family: 'Instrument Serif', serif; font-style: italic;
      font-size: 1.8rem; color: var(--text);
      margin-bottom: 0.3rem;
    }
    .login-sub {
      font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em;
    }

    /* Card */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 1.5rem; padding: 2rem;
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; inset: 0; border-radius: 1.5rem; padding: 1px;
      background: linear-gradient(135deg, rgba(14,165,233,0.3), rgba(229,57,53,0.1), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none;
    }

    .card-heading {
      font-size: 1rem; font-weight: 500; color: var(--text);
      margin-bottom: 1.5rem;
    }

    /* Flash messages */
    .flash-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 0.75rem; padding: 0.75rem 1rem;
      font-size: 0.82rem; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .flash-warning {
      background: rgba(14,165,233,0.1);
      border: 1px solid rgba(14,165,233,0.2);
      color: var(--accent-a);
      border-radius: 0.75rem; padding: 0.75rem 1rem;
      font-size: 0.82rem; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* Form */
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block;
      font-size: 0.68rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 0.85rem; top: 50%;
      transform: translateY(-50%); pointer-events: none;
      color: var(--muted); font-size: 0.9rem;
    }
    .form-control {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid var(--stroke);
      color: var(--text); border-radius: 0.75rem;
      padding: 0.75rem 0.875rem 0.75rem 2.5rem;
      font-size: 0.875rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-control:focus {
      border-color: rgba(14,165,233,0.5);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
      background: rgba(255,255,255,0.06);
    }
    .form-control::placeholder { color: var(--muted); }

    .check-label {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; color: var(--muted); cursor: pointer;
    }
    .check-label input { accent-color: var(--accent-a); width: 14px; height: 14px; cursor: pointer; }

    /* Submit button */
    .btn-submit {
      width: 100%; margin-top: 0.5rem;
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
      color: #fff; border: none; border-radius: 0.75rem;
      padding: 0.875rem; font-size: 0.9rem; font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 24px rgba(14,165,233,0.25);
      letter-spacing: 0.01em;
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    /* Divider for SVG icons */
    .icon { display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<a href="/" id="back-link">
  <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
  Volver al inicio
</a>

<div id="login-wrap">
  <div class="login-logo">
    <div style="display:inline-flex;flex-direction:column;align-items:center;">
      <div class="logo-ring"><span class="logo-letters">SP</span></div>
      <div class="login-title-text">Bienvenido</div>
      <div class="login-sub">Sistema de Prevención de Incendios y Detección</div>
    </div>
  </div>

  <div class="login-card">
    <div class="card-heading">Iniciar sesión</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-{{ category if category in ['error','warning'] else 'error' }}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login" autocomplete="on">
      <div class="form-group">
        <label class="form-label">Usuario o Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input class="form-control" type="text" name="username" placeholder="usuario o correo" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="form-control" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <div class="form-group">
        <label class="check-label">
          <input type="checkbox" name="remember"> Mantener sesión iniciada
        </label>
      </div>
      <button type="submit" class="btn-submit">Ingresar al Sistema →</button>
    </form>
  </div>
</div>

<script>
// ── Canvas background ──────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = H + 10;
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = -(Math.random() * 1.2 + 0.3);
      this.life = 0;
      this.maxLife = Math.random() * 180 + 80;
      this.size = Math.random() * 2 + 0.5;
      this.hue  = Math.random() * 25 + 10;
    }
    update() {
      this.life++;
      this.x += this.vx;
      this.y += this.vy;
      this.vx += (Math.random() - 0.5) * 0.08;
      if (this.life > this.maxLife) this.reset();
    }
    draw() {
      const a = (1 - this.life / this.maxLife) * 0.3;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 85%, 58%, ${a})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 120; i++) {
    const p = new Particle();
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }

  // Grid
  function drawGrid() {
    ctx.strokeStyle = 'rgba(14,165,233,0.03)';
    ctx.lineWidth = 1;
    const s = 80;
    for (let x = 0; x < W; x += s) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += s) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  (function loop() {
    ctx.clearRect(0, 0, W, H);
    const grd = ctx.createRadialGradient(W/2, H*0.6, 0, W/2, H*0.6, W*0.5);
    grd.addColorStop(0, 'rgba(40,10,5,0.5)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
    drawGrid();
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  })();
})();

// ── GSAP entrance ──────────────────────────────────────
window.addEventListener('load', function() {
  gsap.fromTo('#back-link',
    { opacity: 0, x: -20 },
    { opacity: 1, x: 0, duration: 0.8, ease: 'power3.out', delay: 0.2 }
  );
  gsap.fromTo('#login-wrap',
    { opacity: 0, y: 40, filter: 'blur(10px)' },
    { opacity: 1, y: 0, filter: 'blur(0px)', duration: 1, ease: 'power3.out', delay: 0.3 }
  );
});
</script>
</body>
</html>
